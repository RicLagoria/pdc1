<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="description" content="Ejemplos de Bootstrap">
  <meta name="author" content="Lic. Mariela Pastarini">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Bootstrap - Ejemplo 3</title>

  <!-- Enlace al CSS de Bootstrap v5.3.8 -->
  <link href="./css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="container mt-5">
    <div class="row">
      <!-- Alineación -->
      <!--
      col dividiendo equitativamente el ancho entre todas las columnas  
      -->
      <div class="col text-center mb-3">
        <p class="bg-info text-white">Texto centrado horizontalmente</p>
      </div>
  
      <!-- Espaciado: Margen y Padding -->
      <div class="col mb-3">
        <p class="bg-secondary text-white p-3">Párrafo con padding</p>
        <p class="bg-success text-white mt-5">Párrafo con margen superior</p>
      </div>
  
      <!-- Visibilidad -->
      <!--
      col-12 hace que la columna ocupe el 100% del ancho de su contenedor 
      -->
      <div class="col-12 mb-3">
        <p class="bg-danger text-white d-none d-md-block">Visible solo en md y tamaños mayores</p>
        <p class="bg-warning text-white d-block d-md-none">Visible en xs y sm</p>
      </div>
  
      <!-- Alineación de elementos flex -->
      <div class="col-12 d-flex justify-content-between align-items-center mb-3 bg-secondary p-4">
        <div class="p-2 bg-success text-white">Inicio</div>
        <div class="p-2 bg-warning text-white">Centro</div>
        <div class="p-2 bg-danger text-white">Fin</div>
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-12">
        <a href="./index.html">Volver al index principal</a>
      </div>
    </div>  
</div>
  
  <!-- Scripts de Bootstrap v5.3.8 -->
  <script src="./js/bootstrap.min.js"></script>
</body>

</html>
