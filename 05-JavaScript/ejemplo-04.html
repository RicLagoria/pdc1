<!DOCTYPE html>
<html>

<head>
	<meta http-equiv="Content-Type" content="text/html">
	<meta charset="UTF-8">
	<meta name="description" content="Ejemplos de JavaScript">
	<meta name="author" content="Lic. Mariela Pastarini">

	<title>JavaScript - Ejemplo 4</title>

	<link rel="stylesheet" href="./css/bootstrap.min.css">

	<script type="text/javascript" src="./js/ejemplo-04.js"></script>
</head>

<body>
	<h3>Calculadora de Costos de Pedido</h3>
	<form action="javascript:void()" onsubmit="calcularCosto(event)">
		<div class="row">
			<div class="col-12 col-md-6 mb-3">
				<label for="precio">Precio por unidad (sin IVA)</label>
				<input type="number" id="precio" name="precio" class="form-control" required placeholder="Indica el precio"
					value="">
				<input type="hidden" id="impuesto" name="impuesto" value="21">
			</div>
		</div>
		<div class="row">
			<div class="col-12 col-md-6 mb-3">
				<label for="cantidad">Cantidad</label>
				<input type="number" id="cantidad" name="cantidad" class="form-control" required
					placeholder="Indica la cantidad" value="">
			</div>
		</div>
		<div class="row">
			<div class="col-12 col-md-6 mb-3">
				<label for="descuento">Descuento %</label>
				<input type="number" id="descuento" name="descuento" class="form-control" placeholder="Indica si hay descuento"
					value="">
			</div>
		</div>
		<div class="row">
			<div class="col-12 mb-3">
				<button type="submit" class="btn btn-success">Calcular costo total</button>
			</div>
		</div>
	</form>
	<h2 id="resultado" class="mb-3"></h2>
	<a href="./index.html">Volver al index principal</a>
</body>

</html>
