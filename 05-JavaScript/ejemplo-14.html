<body class="container">
	<h3>Web Storage</h3>
	<div class="row mt-3 mb-3">
		<div class="col-12 col-md-6">
			<h5>Contador temporal</h5>
			<p id="tmp" class="alert alert-success col-12"></p>
			<button id="ibtnTmp" type="button" class="btn btn-success col-12">Contar</button>
		</div>
		<div class="col-12 col-md-6">
			<h5>Contador global</h5>
			<p id="global" class="alert alert-info col-12"></p>
			<button id="ibtnGlobal" type="button" class="btn btn-info col-12">Contar</button>
		</div>
	</div>
