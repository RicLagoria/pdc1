<!doctype html>
<html>
<head>
	<meta charset="utf-8">
		
	<title>WEB RESPONSIVE</title>

	<!-- META VIEW PORT-->
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- ESTYLE -->
	<link href="style.css" rel="stylesheet" type="text/css">

	<!-- G FONT -->
	<link href="http://fonts.googleapis.com/css?family=Josefin+Sans:100,300,400" rel="stylesheet" type="text/css">

	<!-- jquery ver boton -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

</head>

<body>

<!-- CONTENEDOR SITIO -->
<div id="wrapSite" class="content">
	<!--HEADER-->
	<header>
    	<h1 id="wrapLogo">
        <img src="images/logo.png" alt="Croydon los originales">
        </h1>
    </header>
    <!-- FIN HEADER -->

	
	<input type="checkbox" name="btmenu" id="btmenu">
	<label for="btmenu">
		<img src="images/menu.svg" alt="Icono Menu" id="icoMenu">
	</label>

	<nav class="menu">
    	<a href="" class="btPrincipal">Inicio</a>
        <a href="" class="btPrincipal">Estilo Croydon</a>
        <a href="" class="btPrincipal">80 años con los colombianos</a>
        <a href="" class="btPrincipal">Contacto</a>
    </nav>
    <!-- FIN MENU -->
    
    <!-- SLIDER -->
    <div id="wrapSlider">
    	<div id="slider">
    		<div id="wrapTxtSlider"><h2>Rompe los límites</h2></div>
    		<div id="wrapImgSlider">
				<picture>
					<source srcset="images/Banner400.jpg" media="(max-width: 400px)">
					<img src="images/slider.jpg" alt="Rompe los limites">
				</picture>

       		</div>
        </div>
    </div>
    <!-- FIN SLIDER -->
	
	
	<!-- CALL TO ACTION -->
	<div id="wrapCall">
		<h2 class="tituloPrincipal">Mundo Croydon</h2>
		<p>Vive más allá de tus propios límites. Vive la experiencia de romper tus barreras, vive el mundo Croydon</p>
		<a href="" class="botonCall">Descubre el mundo Croydon</a>
	</div>
	<!-- FINCALL TO ACTION -->
	
    
    <!-- ENTRADAS -->
	<div class="wrapEntradas">
		
		<article class="entrada">
			<figure class="imgEntrada"><img src="images/imgEntrada1.jpg" alt="entrada1"></figure>
			<div class="enlaceEntrada"><a href="">Rompe lo establecido +</a></div>
		</article>

		<article class="entrada">
			<figure class="imgEntrada"><img src="images/imgEntrada2.jpg" alt="entrada2"></figure>
			<div class="enlaceEntrada"><a href="">¿Lista para iniciar? +</a></div>
		</article>

		<article class="entrada">
			<figure class="imgEntrada"><img src="images/imgEntrada3.jpg" alt="entrada3"></figure>
			<div class="enlaceEntrada"><a href="">Ser el mejor no basta +</a></div>
		</article>
	</div>	
    <!-- ENTRADAS -->

    
    <!-- FOOTER -->
    <footer>
    	<div id="wrapFooter">
        	<h3 id="logoFooter"><img src="images/logoFooter.png" alt="logo footer"></h3>
            
            <ul id="wrapSocial">
            	<li><a href=""><img src="images/icoFacebook.png" alt="facebook"></a></li>
                <li><a href=""><img src="images/icoTwitter.png" alt="Twitter"></a></li>
                <li><a href=""><img src="images/icoGoogle.png" alt="Google +"></a></li>                
            </ul>

        </div>
    </footer>
    <!-- FIN FOOTER -->
    
</div>
<!-- FIN CONTENEDOR SITIO -->

</body>
</html>
